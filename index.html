<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Produk Expired</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#2c7be5;
color:white;
}

.expired{
background:#ffdddd;
}

.warning{
background:#fff3cd;
}
</style>

</head>
<body>

<h1>Dashboard Produk Expired</h1>

<table id="dataTable">
<thead>
<tr>
<th>Tanggal</th>
<th>Kategori</th>
<th>Barcode</th>
<th>Nama Produk</th>
<th>Expired</th>
<th>Jumlah</th>
<th>Lorong</th>
<th>Staff</th>
</tr>
</thead>

<tbody></tbody>
</table>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREz2JiEJyESnFIyafKyu9cYUaUQxlf2zMdYCYgTVY2_AZX5jbHokHVeRv9EZnOhkIGlFDG0I68h2j3/pub?output=csv";

Papa.parse(SHEET_URL, {

download:true,
header:true,

complete:function(results){

let data = results.data;
let table = document.querySelector("#dataTable tbody");

data.forEach(row=>{

if(!row["nama produk"]) return;

let tr = document.createElement("tr");

let today = new Date();
let exp = new Date(row["expired"]);

let diff = (exp - today) / (1000*60*60*24);

if(diff < 0){
tr.classList.add("expired");
}
else if(diff < 30){
tr.classList.add("warning");
}

tr.innerHTML = `

<td>${row["tanggal pengecekan"]}</td>
<td>${row["kategori"]}</td>
<td>${row["barcode"]}</td>
<td>${row["nama produk"]}</td>
<td>${row["expired"]}</td>
<td>${row["jumlah"]}</td>
<td>${row["lorong"]}</td>
<td>${row["staff"]}</td>

`;

table.appendChild(tr);

});

}

});

</script>

</body>
</html>
